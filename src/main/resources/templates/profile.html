<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diễn Cầm Tam Thế | Dashboard Tra Cứu</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body class="dashboard-body">

    <div class="dashboard-wrapper dashboard-layout-page">
        <div class="bg-overlay"></div>
        <div class="spinning-lotus-l"></div>
        <div class="spinning-lotus-r"></div>

        <!-- Header màu sáng đẹp chuẩn phong cách hệ thống -->
        <header class="top-header">
            <div class="header-left">
                <a th:href="@{/dashboard}" class="header-logo">
                    <span class="header-logo-text">Diên Cầm<br>Tam Thế</span>
                </a>
                <nav class="header-nav">
                    <a th:href="@{/dashboard}" class="nav-link">TRA CỨU</a>
                    <a th:href="@{/history}" class="nav-link">LỊCH SỬ</a>
                </nav>
            </div>

            <div class="header-right">
                <div class="account-dropdown-wrapper" style="position: relative;">
                    <button class="header-account-btn" id="account-btn" aria-label="Tài khoản">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </button>
                    <!-- Dropdown -->
                    <div class="account-dropdown" id="account-dropdown">
                        <div class="dropdown-header">
                            <div class="dropdown-avatar">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                            </div>
                            <div class="dropdown-user-info">
                                <span class="dropdown-username">Người dùng</span>
                                <span class="dropdown-role">Thành viên</span>
                            </div>
                        </div>
                        <div class="dropdown-menu">
                            <a th:href="@{/profile}">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                                Hồ sơ
                            </a>
                            <div class="dropdown-divider"></div>
                            <a th:href="@{/auth}" class="logout-item">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                    <polyline points="16 17 21 12 16 7"></polyline>
                                    <line x1="21" y1="12" x2="9" y2="12"></line>
                                </svg>
                                Đăng xuất
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Layout -->
        <div class="dashboard-layout" style="margin: 0 auto; width: 100%; max-width: 900px;">

            <!-- User Profile Area -->
            <main class="main-content">

                <div class="glass-panel"
                    style="padding: 2.5rem; background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(245, 245, 245, 0.85)); border: 2px solid rgba(255, 255, 255, 0.9); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15), inset 0 0 0 1px rgba(220, 185, 110, 0.3);">
                    <div
                        style="display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(220,185,110,0.3); padding-bottom: 2rem;">
                        <div
                            style="width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #dcb96e 0%, #b8860b 100%); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #fff; font-weight: 700; flex-shrink: 0; box-shadow: 0 5px 15px rgba(220, 185, 110, 0.4);">
                            K
                        </div>
                        <div>
                            <h1
                                style="font-family: var(--font-heading); color: #9e7100; margin-bottom: 0.5rem; font-size: 2rem;">
                                Hồ Sơ Cá Nhân</h1>
                            <p class="text-muted" style="color: #666;">Quản lý thông tin bảo mật và cài đặt tài khoản để
                                cá nhân hóa kết quả tra cứu của bạn.</p>
                        </div>
                    </div>

                    <form class="lookup-form" th:action="@{/dashboard}">
                        <h3 class="sidebar-subtitle" style="margin-bottom: 1.5rem;">Thông Tin Cơ Bản</h3>
                        <div class="form-row">
                            <div class="input-group">
                                <label>Họ và Tên</label>
                                <input type="text" value="Khách" required>
                            </div>
                            <div class="input-group">
                                <label>Số điện thoại</label>
                                <input type="tel" placeholder="09xxxxxxx">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="input-group">
                                <label>Email liên hệ</label>
                                <input type="email" value="khach@vidu.com" required>
                            </div>
                            <div class="input-group">
                                <label>Ngày sinh</label>
                                <input type="date" style="color-scheme: dark;">
                            </div>
                        </div>

                        <h3 class="sidebar-subtitle" style="margin-top: 2rem; margin-bottom: 1.5rem;">Đổi Mật Khẩu</h3>
                        <div class="form-row">
                            <div class="input-group">
                                <label>Mật khẩu hiện tại</label>
                                <input type="password" placeholder="Nhập mật khẩu cũ">
                            </div>
                            <div class="input-group">
                                <label>Mật khẩu mới</label>
                                <input type="password" placeholder="Nhập mật khẩu mới">
                            </div>
                        </div>

                        <style>
                            .lookup-form .input-group label {
                                color: #555;
                            }

                            .lookup-form .input-group input {
                                background: #fff;
                                border: 1px solid #ddd;
                                color: #222;
                            }

                            .lookup-form .sidebar-subtitle {
                                color: #9e7100;
                                font-family: 'Times New Roman', serif;
                                text-transform: uppercase;
                                font-size: 1.2rem;
                            }
                        </style>
                        <div class="profile-actions"
                            style="grid-column: 1 / -1; display:flex; justify-content:center; gap:1.5rem; margin-top:2rem;">
                            <a th:href="@{/dashboard}" class="btn"
                                style="background: rgba(200,200,200,0.2); color: #555; border: 1px solid #ddd; padding: 12px 24px; font-weight: 700; border-radius: 6px;">QUAY
                                LẠI</a>
                            <button type="button" class="btn bronze-btn"
                                onclick="alert('Đã cập nhật hệ thống thành công'); window.location.href='/dashboard';">LƯU
                                THAY ĐỔI</button>
                        </div>
                    </form>
                </div>
            </main>

        </div>
    </div>



    <script th:src="@{/js/global.js}"></script>
    <script th:src="@{/js/dashboard.js}"></script>
</body>

</html>
