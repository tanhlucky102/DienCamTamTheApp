<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diễn Cầm Tam Thế | Đăng Nhập & Đăng Ký</title>
    <meta name="description" content="Hệ thống tra cứu tử vi Diễn Cầm Tam Thế - Traditional Artistry & Spirit">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="auth-container glass-panel">
        <div class="auth-header">
            <h1 class="brand-title">DIỄN CẦM TAM THẾ</h1>
            <p class="brand-subtitle">TRADITIONAL ARTISTRY & SPIRIT</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">ĐĂNG NHẬP</button>
            <button class="tab-btn" data-tab="register">ĐĂNG KÝ</button>
        </div>

        <div class="auth-forms">
            <!-- Form Đăng Nhập -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <label for="login-username">TÊN ĐĂNG NHẬP / EMAIL</label>
                    <input type="text" id="login-username" placeholder="Nhập tài khoản của bạn" required>
                </div>
                
                <div class="input-group">
                    <label for="login-password">MẬT KHẨU</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember-me">
                        <span class="checkmark"></span>
                        Ghi nhớ đăng nhập
                    </label>
                    <a href="#" class="forgot-password">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">ĐĂNG NHẬP</button>
            </form>

            <!-- Form Đăng Ký -->
            <form id="register-form" class="auth-form hidden">
                <div class="input-group">
                    <label for="reg-fullname">HỌ VÀ TÊN</label>
                    <input type="text" id="reg-fullname" placeholder="Nhập họ và tên của bạn" required>
                </div>

                <div class="input-group">
                    <label for="reg-email">EMAIL</label>
                    <input type="email" id="reg-email" placeholder="email@vidu.com" required>
                </div>
                
                <div class="input-group">
                    <label for="reg-password">MẬT KHẨU</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="reg-confirm-password">NHẬP LẠI MẬT KHẨU</label>
                    <input type="password" id="reg-confirm-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">ĐĂNG KÝ</button>
                <div class="form-switch-prompt">
                    <span>Đã có tài khoản? </span><a href="#" class="switch-to-login">Đăng nhập</a>
                </div>
            </form>
        </div>

        <div class="auth-footer">
            <nav>
                <a href="#">TRANG CHỦ</a>
                <a href="#">HỖ TRỢ</a>
                <a href="#">ĐIỀU KHOẢN</a>
            </nav>
            <p class="copyright">© 2026 DIỄN CẦM TAM THẾ. ALL RIGHTS RESERVED.</p>
        </div>
    </div>

    <script>
        // Wait for the DOM to be fully loaded
document.addEventListener('DOMContentLoaded', () => {
    
    // Auth Tabs Logic
    const tabBtns = document.querySelectorAll('.tab-btn');
    const authForms = document.querySelectorAll('.auth-form');
    const switchToLoginBtn = document.querySelector('.switch-to-login');

    if (tabBtns.length > 0) {
        // Function to switch active tab
        const switchTab = (tabId) => {
            // Update tabs
            tabBtns.forEach(btn => {
                if(btn.dataset.tab === tabId) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Update forms with simple animation logic
            authForms.forEach(form => {
                if (form.id === `${tabId}-form`) {
                    form.classList.remove('hidden');
                    // slight delay to allow display block to apply before animating opacity
                    setTimeout(() => {
                        form.style.opacity = '1';
                        form.style.transform = 'translateY(0)';
                        form.style.pointerEvents = 'auto';
                        form.style.visibility = 'visible';
                    }, 50);
                } else {
                    form.style.opacity = '0';
                    form.style.transform = 'translateY(10px)';
                    form.style.pointerEvents = 'none';
                    // Wait for transition to finish before hiding
                    setTimeout(() => {
                        form.classList.add('hidden');
                    }, 400); // 400ms matches css transition
                }
            });
        };

        // Event listeners for tabs
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                switchTab(tabId);
            });
        });

        // Specific 'switch to login' link in register form
        if (switchToLoginBtn) {
            switchToLoginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                switchTab('login');
            });
        }
        
        // Handle form submits for demonstration purposes
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');

        if(loginForm) {
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                // Add a simple loading effect
                const btn = loginForm.querySelector('button');
                const originalText = btn.innerText;
                btn.innerText = 'ĐANG XỬ LÝ...';
                
                // Simulate network request then redirect
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            });
        }
        
        if(registerForm) {
            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                // Simulation
                const btn = registerForm.querySelector('button');
                btn.innerText = 'ĐANG XỬ LÝ...';
                setTimeout(() => {
                    switchTab('login');
                    btn.innerText = 'ĐĂNG KÝ';
                }, 800);
            });
        }
    }
});

    </script>
</body>
</html>
