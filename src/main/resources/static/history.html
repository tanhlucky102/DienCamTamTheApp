<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diễn Cầm Tam Thế | Dashboard Tra Cứu</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-body">

<!-- Background Animation from style.css -->
<div class="background-animation">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<!-- Navigation -->
<nav class="top-nav glass-panel glass-nav">
    <div class="nav-brand global-scroll-top">
        <span class="brand-title">DIỄN CẦM TAM THẾ</span>
    </div>
    <div class="nav-user" style="display:flex; align-items:center; gap: 1rem;">
        <a href="#" class="icon-btn" title="Thông báo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </a>
        <a href="profile.html" class="icon-btn profile-icon" title="Tài khoản">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </a>
        <span class="user-greeting">Xin chào, Khách</span>
        <a href="index.html" class="icon-btn logout-btn" title="Đăng xuất">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </a>
        <button id="toggle-sidebar" class="btn btn-primary btn-sm">Menu</button>
    </div>
</nav>

<!-- Main Content Layout -->
<div class="dashboard-layout">

    <!-- Main Scrollable Area -->
    <main class="main-content">
        <!-- Back Navigation -->
        <a href="javascript:history.back()" class="breadcrumb-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            <span>Quay lại</span>
        </a>

        <div class="glass-panel" style="padding: 2.5rem;">
            <h2 style="font-family: var(--font-heading); color: var(--color-primary); margin-bottom: 1.5rem; font-size: 2rem; text-align: center;">Tất Cả Lịch Sử Tra Cứu</h2>

            <div class="input-group" style="margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto;">
                <input type="text" id="history-search" placeholder="Tìm kiếm theo tên người, danh mục hoặc ngày tra cứu..." style="background: rgba(0,0,0,0.5); border-radius: 30px; padding: 1rem 1.5rem; border: 1px solid var(--color-border); color: #FFF; width: 100%;">
            </div>

            <div id="full-history-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
                <!-- Filled by js/history.js -->
            </div>
        </div>
    </main>

    <!-- Right Sidebar (History, Project, Common features) -->
    <aside class="right-sidebar glass-panel" id="right-sidebar">
        <div class="sidebar-header" style="justify-content:flex-end;">
            <!-- User requested removing "Thanh Công Cụ" text -->
            <button id="close-sidebar" class="close-btn">&times;</button>
        </div>

        <div class="sidebar-content">
            <!-- Section: Project -->
            <div class="sidebar-section">
                <h4 class="sidebar-subtitle">Project & Hồ Sơ</h4>
                <ul class="sidebar-list">
                    <li><a href="profile.html">Thông tin tài khoản</a></li>
                    <li><a href="#">Gói dịch vụ Premium</a></li>
                    <li><a href="#">Quản lý Project</a></li>
                </ul>
            </div>

            <!-- Section: Lịch sử tra cứu -->
            <div class="sidebar-section">
                <h4 class="sidebar-subtitle">Lịch sử tra cứu</h4>
                <div class="history-list" id="history-list">
                    <!-- History items generated by JS -->
                </div>
                <a href="history.html" class="btn btn-primary btn-sm btn-block" style="margin-top:1rem; text-align:center; display:block;">Xem tất cả lịch sử</a>
            </div>

            <!-- Section: Common Features -->
            <div class="sidebar-section">
                <h4 class="sidebar-subtitle">Tính Năng Hỗ Trợ</h4>
                <ul class="sidebar-list">
                    <li><a href="#">Bát tự - Tứ trụ</a></li>
                    <li><a href="#">Kinh Dịch</a></li>
                    <li><a href="#">Xem ngày tốt xấu</a></li>
                    <li><a href="#">Hỗ trợ chuyên gia</a></li>
                </ul>
            </div>
        </div>
    </aside>

</div>

<!-- Background overlay for sidebar on mobile -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>



<script src="js/global.js"></script>
<script src="js/history.js"></script>
</body>
</html>
