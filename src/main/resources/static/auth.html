<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diễn Cầm Tam Thế | Đăng Nhập & Đăng Ký</title>
    <meta name="description" content="Hệ thống tra cứu tử vi Diễn Cầm Tam Thế - Traditional Artistry & Spirit">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-body">

    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="auth-container glass-panel">
        <div class="auth-header">
            <h1 class="brand-title">DIỄN CẦM TAM THẾ</h1>
            <p class="brand-subtitle">TRADITIONAL ARTISTRY & SPIRIT</p>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">ĐĂNG NHẬP</button>
            <button class="tab-btn" data-tab="register">ĐĂNG KÝ</button>
        </div>

        <div class="auth-forms">
            <!-- Form Đăng Nhập -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <label for="login-username">TÊN ĐĂNG NHẬP / EMAIL</label>
                    <input type="text" id="login-username" placeholder="Nhập tài khoản của bạn" required>
                </div>

                <div class="input-group">
                    <label for="login-password">MẬT KHẨU</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember-me">
                        <span class="checkmark"></span>
                        Ghi nhớ đăng nhập
                    </label>
                    <a href="#" class="forgot-password">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">ĐĂNG NHẬP</button>
            </form>

            <!-- Form Đăng Ký -->
            <form id="register-form" class="auth-form hidden">
                <div class="input-group">
                    <label for="reg-fullname">HỌ VÀ TÊN</label>
                    <input type="text" id="reg-fullname" placeholder="Nhập họ và tên của bạn" required>
                </div>

                <div class="input-group">
                    <label for="reg-email">EMAIL</label>
                    <input type="email" id="reg-email" placeholder="email@vidu.com" required>
                </div>

                <div class="input-group">
                    <label for="reg-password">MẬT KHẨU</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="reg-confirm-password">NHẬP LẠI MẬT KHẨU</label>
                    <input type="password" id="reg-confirm-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">ĐĂNG KÝ</button>
                <div class="form-switch-prompt">
                    <span>Đã có tài khoản? </span><a href="#" class="switch-to-login">Đăng nhập</a>
                </div>
            </form>

            <!-- Form Quên Mật Khẩu -->
            <form id="forgot-password-form" class="auth-form hidden">
                <div class="input-group">
                    <label for="forgot-username">TÊN ĐĂNG NHẬP / EMAIL</label>
                    <input type="text" id="forgot-username" placeholder="Nhập tài khoản của bạn" required>
                </div>

                <div class="input-group">
                    <label for="forgot-password-input">MẬT KHẨU MỚI</label>
                    <input type="password" id="forgot-password-input" placeholder="••••••••" required>
                </div>

                <div class="input-group">
                    <label for="forgot-confirm-password">XÁC NHẬN MẬT KHẨU MỚI</label>
                    <input type="password" id="forgot-confirm-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">CẬP NHẬT MẬT KHẨU</button>
                <div class="form-switch-prompt">
                    <span>Nhớ mật khẩu? </span><a href="#" class="switch-to-login-from-forgot">Đăng nhập</a>
                </div>
            </form>
        </div>

        <div class="auth-footer">
            <nav>
                <a href="#">TRANG CHỦ</a>
                <a href="#">HỖ TRỢ</a>
                <a href="#">ĐIỀU KHOẢN</a>
            </nav>
            <p class="copyright">© 2026 DIỄN CẦM TAM THẾ. ALL RIGHTS RESERVED.</p>
        </div>
    </div>

    <script>
        // Wait for the DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', () => {

            // Auth Tabs Logic
            const tabBtns = document.querySelectorAll('.tab-btn');
            const authForms = document.querySelectorAll('.auth-form');
            const switchToLoginBtn = document.querySelector('.switch-to-login');

            if (tabBtns.length > 0) {
                // Function to switch active tab
                const switchTab = (tabId) => {
                    const authTabs = document.querySelector('.auth-tabs');
                    if(authTabs) {
                        authTabs.style.display = (tabId === 'forgot-password') ? 'none' : 'flex';
                    }

                    // Update tabs
                    tabBtns.forEach(btn => {
                        if (btn.dataset.tab === tabId) {
                            btn.classList.add('active');
                        } else {
                            btn.classList.remove('active');
                        }
                    });

                    // Cập nhật form với hiệu ứng mượt mà (ẩn hoàn toàn form cũ rồi mới hiện form mới)
                    let formsToHide = 0;
                    authForms.forEach(form => {
                        if (!form.classList.contains('hidden') && form.id !== `${tabId}-form`) {
                            formsToHide++;
                            form.style.opacity = '0';
                            form.style.transform = 'translateY(10px)';
                            form.style.pointerEvents = 'none';

                            // Chờ form mờ hẳn rồi mới ẩn khỏi DOM và hiện form mới
                            setTimeout(() => {
                                form.classList.add('hidden');
                                showNewForm(tabId);
                            }, 300); // Thời gian khớp với CSS transition
                        }
                    });

                    if (formsToHide === 0) {
                        showNewForm(tabId);
                    }

                    function showNewForm(targetTabId) {
                        authForms.forEach(form => {
                            if (form.id === `${targetTabId}-form`) {
                                form.classList.remove('hidden');
                                // delay nhỏ để trình duyệt kịp apply display: block
                                setTimeout(() => {
                                    form.style.opacity = '1';
                                    form.style.transform = 'translateY(0)';
                                    form.style.pointerEvents = 'auto';
                                    form.style.visibility = 'visible';
                                }, 50);
                            }
                        });
                    }
                };

                // Event listeners for tabs
                tabBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const tabId = btn.dataset.tab;
                        switchTab(tabId);
                    });
                });

                // Specific 'switch to login' link in register form
                if (switchToLoginBtn) {
                    switchToLoginBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        switchTab('login');
                    });
                }

                // Handle form submits for demonstration purposes
                const loginForm = document.getElementById('login-form');
                const registerForm = document.getElementById('register-form');

                if (loginForm) {
                    loginForm.addEventListener('submit', async (e) => {
                        e.preventDefault();

                        const username = document.getElementById('login-username').value;
                        const password = document.getElementById('login-password').value;

                        const btn = loginForm.querySelector('button');
                        const originalText = btn.innerText;
                        btn.innerText = 'ĐANG XỬ LÝ...';
                        btn.disabled = true;

                        try {
                            const response = await fetch('/auth/login', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    username: username,
                                    password: password
                                })
                            });

                            const result = await response.json();

                            if (response.ok && (result.status === 200 || result.code === 0)) {
                                // Lưu thông tin đăng nhập hoặc token nếu cần (hiện tại backend chỉ trả về string)
                                // localStorage.setItem('user', JSON.stringify(result.data));

                                // Chuyển hướng sang dashboard
                                window.location.href = 'dashboard.html';
                            } else {
                                alert('Đăng nhập thất bại: ' + (result.message || 'Tài khoản hoặc mật khẩu không chính xác.'));
                            }
                        } catch (error) {
                            console.error('Lỗi khi gọi API đăng nhập:', error);
                            alert('Không thể kết nối với máy chủ API!');
                        } finally {
                            btn.innerText = originalText;
                            btn.disabled = false;
                        }
                    });
                }

                if (registerForm) {
                    registerForm.addEventListener('submit', async (e) => {
                        e.preventDefault();

                        const password = document.getElementById('reg-password').value;
                        const confirmPassword = document.getElementById('reg-confirm-password').value;

                        // Vì database Entity Backend hiện chỉ có username, ta lấy email làm giá trị username
                        const email = document.getElementById('reg-email').value;

                        if (password !== confirmPassword) {
                            alert('Mật khẩu nhập lại không khớp!');
                            return;
                        }

                        const btn = registerForm.querySelector('button');
                        const originalText = btn.innerText;
                        btn.innerText = 'ĐANG XỬ LÝ...';
                        btn.disabled = true;

                        try {
                            const response = await fetch('/auth/register', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    username: email,
                                    password: password
                                })
                            });

                            const result = await response.json();

                            if (response.ok && result.status === 200) {
                                alert('Đăng ký thành công! Vui lòng tiến hành đăng nhập.');
                                registerForm.reset();
                                switchTab('login');
                                // Tiện tay điền thẳng số email vừa lên form Login cho user
                                if (document.getElementById('login-username')) {
                                    document.getElementById('login-username').value = email;
                                }
                            } else {
                                alert('Lỗi: ' + (result.message || 'Đã có lỗi xảy ra. Vui lòng thử lại.'));
                            }
                        } catch (error) {
                            console.error('Lỗi khi gọi API:', error);
                            alert('Không thể kết nối với máy chủ API!');
                        } finally {
                            btn.innerText = originalText;
                            btn.disabled = false;
                        }
                    });
                }

                // Xử lý quên mật khẩu (Chuyển đổi tab)
                const forgotPasswordLink = document.querySelector('.forgot-password');
                const switchToLoginFromForgotBtn = document.querySelector('.switch-to-login-from-forgot');

                if (forgotPasswordLink) {
                    forgotPasswordLink.addEventListener('click', (e) => {
                        e.preventDefault();
                        switchTab('forgot-password');
                    });
                }

                if (switchToLoginFromForgotBtn) {
                    switchToLoginFromForgotBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        switchTab('login');
                    });
                }

                // Gửi form quên mật khẩu
                const forgotPasswordForm = document.getElementById('forgot-password-form');
                if (forgotPasswordForm) {
                    forgotPasswordForm.addEventListener('submit', async (e) => {
                        e.preventDefault();

                        const username = document.getElementById('forgot-username').value;
                        const newPassword = document.getElementById('forgot-password-input').value;
                        const confirmPassword = document.getElementById('forgot-confirm-password').value;

                        if (newPassword !== confirmPassword) {
                            alert('Mật khẩu mới và mật khẩu xác nhận không khớp!');
                            return;
                        }

                        const btn = forgotPasswordForm.querySelector('button');
                        const originalText = btn.innerText;
                        btn.innerText = 'ĐANG XỬ LÝ...';
                        btn.disabled = true;

                        try {
                            const response = await fetch('/auth/forgot-password', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    username: username,
                                    newPassword: newPassword
                                })
                            });

                            const result = await response.json();

                            if (response.ok && (result.status === 200 || result.code === 0)) {
                                alert('Cập nhật mật khẩu thành công! Vui lòng đăng nhập lại.');
                                forgotPasswordForm.reset();
                                switchTab('login');
                                if (document.getElementById('login-username')) {
                                    document.getElementById('login-username').value = username;
                                }
                            } else {
                                alert('Lỗi: ' + (result.message || 'Tài khoản không tồn tại.'));
                            }
                        } catch (error) {
                            console.error('Lỗi khi gọi API quên mật khẩu:', error);
                            alert('Không thể kết nối với máy chủ API!');
                        } finally {
                            btn.innerText = originalText;
                            btn.disabled = false;
                        }
                    });
                }
            }
        });

    </script>
</body>

</html>
